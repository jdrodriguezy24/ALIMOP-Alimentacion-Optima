services:
  app:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    image: alimop-app-image
    container_name: alimop-app
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alimop-network

  db:
    image: mysql:8.0
    container_name: alimop-db
    env_file:
      - ../.env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
    networks:
      - alimop-network

volumes:
  mysql_data:

networks:
  alimop-network:
    driver: bridge