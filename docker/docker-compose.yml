services:
  app:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alimop-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=admins25
      - DB_DATABASE=alimop
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alimop-network

  db:
    image: mysql:8.0
    container_name: alimop-db
    environment:
      - MYSQL_ROOT_PASSWORD=admins25
      - MYSQL_DATABASE=alimop
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
    networks:
      - alimop-network

volumes:
  mysql_data:

networks:
  alimop-network:
    driver: bridge