stages:
  - build
  - deploy

variables:
  NODE_ENV: production
  IMAGE_REGISTRY: node:24

build:
  stage: build
  image: ${IMAGE_REGISTRY}
  script:
    - npm ci
    - echo "Build completado para proyecto ALIMOP"
  artifacts:
    paths:
      - node_modules/
  expire_in: 1 hour
  cache:
    paths:
      - node_modules/
  only:
    - branches
    - merge_requests

deploy_development:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t alimop:dev .
    - echo "Deploy en desarrollo completado"
  environment:
    name: development
    url: https://desarrollo.alimop.local
  only:
    - develop
  when: on_success

deploy_production:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t alimop:latest .
    - echo "Deploy en producción completado"
  environment:
    name: production
    url: https://alimop.com
  only:
    - main
    - master
  when: manual